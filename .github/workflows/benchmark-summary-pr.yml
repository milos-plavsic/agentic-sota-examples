name: Benchmark Summary PR

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  refresh-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Rebuild reports and benchmark summary
        run: |
          make run-all
          make benchmark-summary
      - name: Create pull request with benchmark refresh
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs(benchmark): refresh latest benchmark summary"
          title: "docs: refresh benchmark summary"
          body: |
            Automated benchmark summary refresh generated by scheduled workflow.
          branch: "bot/benchmark-summary-refresh"
          delete-branch: true
