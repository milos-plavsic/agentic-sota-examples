name: Benchmark Summary Refresh

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  refresh-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Rebuild reports and benchmark summary
        run: |
          make run-all
          make benchmark-summary
      - name: Commit benchmark summary refresh
        run: |
          if git diff --quiet -- docs/LATEST_BENCHMARK_SUMMARY.md; then
            echo "No benchmark summary changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/LATEST_BENCHMARK_SUMMARY.md
          git commit -m "docs(benchmark): refresh latest benchmark summary"
          git push
