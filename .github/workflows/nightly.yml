name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  keyless-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run all project smoke + benchmark artifacts
        run: |
          pytest -q tests/test_projects_smoke.py tests/test_data_sources.py tests/test_artifacts.py tests/test_contract_schema.py tests/test_fallback_behavior.py tests/test_benchmark_inputs.py
          make run-all
          make real-benchmarks
      - name: Build benchmark index
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          reports = Path("reports")
          rows = []
          for p in sorted(reports.glob("*-summary.json")):
              data = json.loads(p.read_text())
              rows.append({
                  "project": data["project"],
                  "confidence_score": data["confidence_score"],
                  "iterations": data["iterations"],
                  "stop_reason": data["loop_terminated_reason"],
                  "used_fallback": data["used_fallback"],
              })
          Path("reports/nightly-benchmark.json").write_text(json.dumps(rows, indent=2))
          PY
      - name: Regenerate benchmark summary markdown
        run: |
          make benchmark-summary
      - name: Upload nightly artifacts
        # TODO: bump to next major once upload-artifact is Node24-native upstream.
        uses: actions/upload-artifact@v5
        with:
          name: nightly-results
          path: |
            reports/
            docs/LATEST_BENCHMARK_SUMMARY.md

  provider-enabled-matrix:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run provider-aware smoke
        if: ${{ env.OPENAI_API_KEY != '' || env.ANTHROPIC_API_KEY != '' }}
        run: |
          python run_project.py --project 01-eval-driven-agent > provider_01.json
          python run_project.py --project 08-cost-quality-model-router > provider_08.json
      - name: Upload provider artifacts
        if: ${{ env.OPENAI_API_KEY != '' || env.ANTHROPIC_API_KEY != '' }}
        # TODO: bump to next major once upload-artifact is Node24-native upstream.
        uses: actions/upload-artifact@v5
        with:
          name: nightly-provider-results
          path: |
            provider_01.json
            provider_08.json
